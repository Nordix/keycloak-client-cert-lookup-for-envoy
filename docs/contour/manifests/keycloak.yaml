apiVersion: v1
kind: Service
metadata:
  name: keycloak
spec:
  selector:
    app: keycloak
  ports:
    - name: https
      port: 8443
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak-headless
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app: keycloak
  ports:
    - name: https
      port: 8443
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: keycloak
spec:
  selector:
    matchLabels:
      app: keycloak
  replicas: 1
  serviceName: keycloak-headless
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:26.5.6
          command:
            - /bin/bash
            - -cxe
            - |
              cp /host/target/keycloak-client-cert-lookup-for-envoy-*.jar /opt/keycloak/providers/keycloak-client-cert-lookup-for-envoy.jar
              /opt/keycloak/bin/kc.sh import --file /host/src/test/resources/integration-test/keycloak-realm.json
              /opt/keycloak/bin/kc.sh start \
                --https-certificate-file=/host/docs/contour/target/certs/keycloak.pem \
                --https-certificate-key-file=/host/docs/contour/target/certs/keycloak-key.pem \
                --truststore-paths=/host/docs/contour/target/certs/client-ca.pem \
                --https-client-auth=request \
                --spi-x509cert-lookup-provider=envoy \
                --spi-x509cert-lookup-envoy-cert-path-verify='[[ "CN=envoy-client" ]]' \
                --log-level=INFO,io.github.nordix.keycloak.services.x509:debug
          env:
            - name: KC_BOOTSTRAP_ADMIN_USERNAME
              value: admin
            - name: KC_BOOTSTRAP_ADMIN_PASSWORD
              value: admin
            - name: KC_HOSTNAME
              value: https://keycloak.127.0.0.1.nip.io:8443
          volumeMounts:
            - name: host
              mountPath: /host
              readOnly: true
      volumes:
        - name: host
          hostPath:
            path: /host
